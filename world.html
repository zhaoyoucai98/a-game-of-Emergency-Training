<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const MODEL_URL = './model/young_person_model.json';

const app = document.getElementById('app');
const loading = document.getElementById('loading');
const posEl = document.getElementById('pos');
const fpsEl = document.getElementById('fps');
const btnIdle   = document.getElementById('btnIdle');
const btnReset  = document.getElementById('btnReset');

/* ---------- 娓叉煋鍣?/ 鍦烘櫙 / 鐩告満 ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color('#eaf0f5');
scene.fog = new THREE.Fog('#eaf0f5', 14, 28);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
// 鎶珮瑙嗚锛氫粠鍘?(3.6, 2.6, 4.4) 鎻愬崌鍒?(3.6, 4.6, 4.4) 鎻愪緵鏇村箍闃旂殑淇
camera.position.set(3.6, 4.6, 4.4);

const FPS_PIXEL_RATIO_CAP = 1.25;
const renderer = new THREE.WebGLRenderer({ antialias:false, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio||1, FPS_PIXEL_RATIO_CAP));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.BasicShadowMap;
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1.4, 0);
controls.minDistance = 2;
controls.maxDistance = 12;
// 鐣ユ斁寮€淇涓婇檺锛岄厤鍚堟姮楂樼殑鐩告満楂樺害
controls.maxPolarAngle = Math.PI * 0.46;

/* ---------- 鐏厜 ---------- */
scene.add(new THREE.HemisphereLight('#f7fbff', '#c8d2dc', 1.4));
const key = new THREE.DirectionalLight('#ffffff', 2.2);
key.position.set(4, 6, 5);
key.castShadow = true;
key.shadow.mapSize.set(512, 512);
key.shadow.camera.near = 0.5;
key.shadow.camera.far = 18;
key.shadow.camera.left = -5;
key.shadow.camera.right = 5;
key.shadow.camera.top = 5;
key.shadow.camera.bottom = -5;
scene.add(key);
const fill = new THREE.DirectionalLight('#cde9ff', 0.7);
fill.position.set(-4, 3, -2);
scene.add(fill);

function makeFloorTexture(){
  const cv = document.createElement('canvas');
  cv.width = cv.height = 512;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#eef2f5';
  ctx.fillRect(0, 0, 512, 512);

  const TILE = 128;
  for(let y = 0; y < 512; y += TILE){
    for(let x = 0; x < 512; x += TILE){
      const v = Math.floor(Math.random() * 8) - 4;
      const c = 238 + v;
      ctx.fillStyle = `rgb(${c},${c + 4},${c + 9})`;
      ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);

      const grad = ctx.createLinearGradient(x, y, x + TILE, y + TILE);
      grad.addColorStop(0, 'rgba(255,255,255,0.10)');
      grad.addColorStop(0.5, 'rgba(255,255,255,0)');
      grad.addColorStop(1, 'rgba(0,0,0,0.05)');
      ctx.fillStyle = grad;
      ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
    }
  }

  ctx.strokeStyle = '#c4cdd6';
  ctx.lineWidth = 2;
  for(let i = 0; i <= 512; i += TILE){
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, 512);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(512, i);
    ctx.stroke();
  }

  const img = ctx.getImageData(0, 0, 512, 512);
  const d = img.data;
  for(let i = 0; i < d.length; i += 4){
    const n = (Math.random() - 0.5) * 8;
    d[i] = Math.max(0, Math.min(255, d[i] + n));
    d[i + 1] = Math.max(0, Math.min(255, d[i + 1] + n));
    d[i + 2] = Math.max(0, Math.min(255, d[i + 2] + n));
  }
  ctx.putImageData(img, 0, 0);

  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(8, 8);
  tex.anisotropy = 8;
  return tex;
}
const floorTex = makeFloorTexture();
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ map: floorTex, roughness:.78, metalness:.04 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);
// 淇濈暀娣＄綉鏍间綔涓虹┖闂村弬鑰冿紙鏇翠綆涓嶉€忔槑搴︼紝涓嶆姠鎴忥級
const grid = new THREE.GridHelper(20, 20, 0xb8c4cf, 0xcdd6de);
grid.position.y = 0.002;
grid.material.transparent = true;
grid.material.opacity = 0.25;
scene.add(grid);

/* ---------- 绋嬪簭鍖栨瀯寤烘ā鍨嬶紙鍩轰簬 JSON parts 鎻忚堪锛?----------
 * JSON 鍙粰浜?position/scale/rotation 鍜?geometry 鍚嶏紝
 * 鍥犳涓烘瘡涓?part 鎻愪緵涓庝汉浣撴瘮渚嬩竴鑷寸殑"鍩虹鍑犱綍灏哄"銆? */
const baseShapes = {
  left_leg:    { type:'capsule', r:0.13, len:0.85 },
  right_leg:   { type:'capsule', r:0.13, len:0.85 },
  left_shoe:   { type:'box',  size:[0.20,0.10,0.34] },
  right_shoe:  { type:'box',  size:[0.20,0.10,0.34] },
  hoodie_body: { type:'capsule', r:0.34, len:0.80 },
  neck:        { type:'cyl',  rt:0.075, rb:0.085, h:0.16 },
  left_arm:    { type:'capsule', r:0.085, len:0.62 },
  right_arm:   { type:'capsule', r:0.085, len:0.62 },
  left_hand:   { type:'sphere', r:0.085 },
  right_hand:  { type:'sphere', r:0.085 },
  head:        { type:'sphere', r:0.24 },
  hair:        { type:'sphere', r:0.245 },
  left_eye:    { type:'sphere', r:0.022 },
  right_eye:   { type:'sphere', r:0.022 },
  mouth:       { type:'box',  size:[0.085,0.018,0.012] },
};
const limbAlongY = new Set(['left_leg','right_leg','hoodie_body','neck','left_arm','right_arm']);

function makeMaterial(spec){
  return new THREE.MeshStandardMaterial({
    color: spec.color,
    roughness: spec.roughness ?? 0.7,
    metalness: spec.metalness ?? 0,
  });
}
function makeGeometry(part){
  const s = baseShapes[part.name];
  if(!s) return new THREE.BoxGeometry(0.1,0.1,0.1);
  switch(s.type){
    case 'capsule': return new THREE.CapsuleGeometry(s.r, s.len, 8, 16);
    case 'box':     return new THREE.BoxGeometry(s.size[0], s.size[1], s.size[2]);
    case 'sphere':  return new THREE.SphereGeometry(s.r, 18, 14);
    case 'cyl':     return new THREE.CylinderGeometry(s.rt, s.rb, s.h, 18);
  }
  return new THREE.BoxGeometry(0.1,0.1,0.1);
}

async function loadModel(){
  const cfg = await fetch(MODEL_URL).then(r=>{
    if(!r.ok) throw new Error('fetch failed: '+r.status);
    return r.json();
  });
  const matCache = {};
  for(const [k,v] of Object.entries(cfg.materials||{})) matCache[k] = makeMaterial(v);

  const root = new THREE.Group();
  root.name = cfg.name || 'young_person';
  for(const part of cfg.parts||[]){
    const geo = makeGeometry(part);
    const mat = matCache[part.material] || matCache.skin || new THREE.MeshStandardMaterial();
    const mesh = new THREE.Mesh(geo, mat);
    mesh.name = part.name;
    mesh.position.fromArray(part.position||[0,0,0]);
    if(part.rotation) mesh.rotation.fromArray(part.rotation);
    if(part.scale)    mesh.scale.fromArray(part.scale);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.frustumCulled = true; // 鎬ц兘浼樺寲
    root.add(mesh);
  }

  const headPivotY = 1.62;
  const headGroup = new THREE.Group();
  headGroup.name = 'head_group';
  headGroup.position.set(0, headPivotY, 0);
  const headPartNames = ['head','hair','left_eye','right_eye','mouth'];
  for(const name of headPartNames){
    const m = root.getObjectByName(name);
    if(!m) continue;
    m.position.y -= headPivotY;
    headGroup.add(m);
  }
  root.add(headGroup);
  root.userData.headGroup = headGroup; // 鏆撮湶缁欎富寰幆浣跨敤

  return root;
}

/* ============================================================
 * NPC 妯″瀷鏋勫缓锛氬尰鐢燂紙绉绘鑷?doctor.html锛? AED锛堢Щ妞嶈嚜 aed.html锛? 鐥呬汉
 * 鍏ㄩ儴绋嬪簭鍖栧嚑浣曪紝閬垮厤澶栭儴璧勬簮鍔犺浇锛屾€ц兘寮€閿€ < 1ms
 * ============================================================ */
function buildDoctor(){
  const g = new THREE.Group();
  g.name = '鍖荤敓';
  const matWhite=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.78});
  const matBlue =new THREE.MeshStandardMaterial({color:0x3f9fd6,roughness:.72});
  const matSkin =new THREE.MeshStandardMaterial({color:0xf0c29d,roughness:.76});
  const matDark =new THREE.MeshStandardMaterial({color:0x263238,roughness:.8});
  const matMetal=new THREE.MeshStandardMaterial({color:0x87939a,metalness:.2,roughness:.45});
  const matBlack=new THREE.MeshStandardMaterial({color:0x111820,roughness:.8});
  const blk=(x,y,z,w,h,d,m)=>{
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);
    mesh.position.set(x,y,z); mesh.castShadow=mesh.receiveShadow=true; return mesh;
  };
  g.add(blk(0,2.08,0,.58,.48,.48,matSkin));
  g.add(blk(0,2.35,-0.02,.62,.14,.52,matDark));
  g.add(blk(0,2.22,.23,.62,.12,.08,matDark));
  g.add(blk(-0.13,2.11,.245,.055,.055,.012,matBlack));
  g.add(blk(0.13,2.11,.245,.055,.055,.012,matBlack));
  g.add(blk(0,1.98,.25,.16,.035,.014,matBlack));
  g.add(blk(0,1.25,0,.72,1.16,.38,matWhite));
  g.add(blk(0,1.22,.205,.34,.92,.035,matBlue));
  const cL=blk(-0.16,1.68,.23,.18,.22,.035,matWhite); cL.rotation.z=-0.25; g.add(cL);
  const cR=blk(0.16,1.68,.23,.18,.22,.035,matWhite);  cR.rotation.z= 0.25; g.add(cR);
  g.add(blk(-0.55,1.22,0,.22,1.06,.26,matWhite));
  g.add(blk(0.55,1.22,0,.22,1.06,.26,matWhite));
  g.add(blk(-0.55,.6,0,.22,.18,.26,matSkin));
  g.add(blk(0.55,.6,0,.22,.18,.26,matSkin));
  g.add(blk(-0.19,.34,0,.26,.76,.3,matDark));
  g.add(blk(0.19,.34,0,.26,.76,.3,matDark));
  g.add(blk(-0.19,.03,.06,.28,.12,.42,matBlack));
  g.add(blk(0.19,.03,.06,.28,.12,.42,matBlack));
  g.add(blk(0,1.56,.25,.46,.045,.035,matMetal));
  g.add(blk(0.16,1.33,.25,.045,.38,.035,matMetal));
  g.add(blk(0.16,1.1,.26,.14,.14,.035,matMetal));
  return g;
}

function buildAED(){
  const g = new THREE.Group();
  g.name = 'AED';
  const matWhite=new THREE.MeshStandardMaterial({color:0xf7fafc,roughness:.72});
  const matOrange=new THREE.MeshStandardMaterial({color:0xf07b25,roughness:.66});
  const matDark=new THREE.MeshStandardMaterial({color:0x233246,roughness:.58});
  const matScreen=new THREE.MeshStandardMaterial({color:0x102a43,roughness:.34,emissive:0x071929,emissiveIntensity:.6});
  const matGreen=new THREE.MeshStandardMaterial({color:0x22c55e,roughness:.45,emissive:0x0c4d26,emissiveIntensity:.7});
  // 绠€鍖栫増锛氱敤 Box + Cylinder 浠ｆ浛鍘?ExtrudeGeometry锛屾€ц兘鏇翠紭
  const body=new THREE.Mesh(new THREE.BoxGeometry(.9,.7,.18),matWhite);
  body.position.set(0,.55,0); body.castShadow=body.receiveShadow=true; g.add(body);
  const panel=new THREE.Mesh(new THREE.BoxGeometry(.32,.55,.02),matOrange);
  panel.position.set(-.22,.55,.10); g.add(panel);
  const screen=new THREE.Mesh(new THREE.BoxGeometry(.30,.14,.02),matScreen);
  screen.position.set(.16,.74,.10); g.add(screen);
  const power=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,.02,18),matGreen);
  power.position.set(.14,.50,.10); power.rotation.x=Math.PI/2; g.add(power);
  const shock=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,.02,18),matOrange);
  shock.position.set(.30,.50,.10); shock.rotation.x=Math.PI/2; g.add(shock);
  const indicator=new THREE.Mesh(new THREE.SphereGeometry(.025,12,8),matGreen);
  indicator.position.set(.30,.70,.11); g.add(indicator);
  // 搴曞骇锛堝叕鍏卞満鎵€鎬ユ晳绠憋級
  const stand=new THREE.Mesh(new THREE.BoxGeometry(1.0,.18,.32),matDark);
  stand.position.set(0,.09,0); stand.castShadow=stand.receiveShadow=true; g.add(stand);
  return g;
}

function buildPatient(){
  const g = new THREE.Group();
  g.name = '鐥呬汉';
  const gownMat=new THREE.MeshStandardMaterial({color:0x9fc8d8,roughness:.78});
  const skinMat=new THREE.MeshStandardMaterial({color:0xf2c7ab,roughness:.9});
  const limbMat=new THREE.MeshStandardMaterial({color:0xd6e1e8,roughness:.82});
  const bedMat =new THREE.MeshStandardMaterial({color:0xeef3f7,roughness:.95});
const bed=new THREE.Mesh(new THREE.BoxGeometry(2.4,.24,1.0),bedMat);
  bed.position.y=.45; bed.castShadow=bed.receiveShadow=true; g.add(bed);
  const sheet=new THREE.Mesh(new THREE.BoxGeometry(2.0,.05,.9),new THREE.MeshStandardMaterial({color:0xe9f0f5,roughness:.94}));
  sheet.position.y=.60; g.add(sheet);
const torso=new THREE.Mesh(new THREE.BoxGeometry(1.2,.28,.55),gownMat);
  torso.position.set(0,.74,0); torso.castShadow=true; g.add(torso);
  const head=new THREE.Mesh(new THREE.SphereGeometry(.20,18,14),skinMat);
  head.scale.set(1,.95,.92);
  head.position.set(.85,.74,0); head.castShadow=true; g.add(head);
  const pillow=new THREE.Mesh(new THREE.BoxGeometry(.4,.06,.42),new THREE.MeshStandardMaterial({color:0xf7fbff,roughness:.95}));
  pillow.position.set(.85,.62,0); g.add(pillow);
  // 鎵嬭噦 / 鑵匡紙capsule 绠€鍖栵級
  const limb=(len,r,x,y,z)=>{
    const m=new THREE.Mesh(new THREE.CapsuleGeometry(r,len,6,12),limbMat);
    m.position.set(x,y,z); m.rotation.z=Math.PI/2; m.castShadow=true; return m;
  };
  g.add(limb(.7,.075,.15,.74,.4));
  g.add(limb(.7,.075,.15,.74,-.4));
  g.add(limb(.9,.09,-.85,.66,.18));
  g.add(limb(.9,.09,-.85,.66,-.18));
  return g;
}

function buildNurse(){
  const g = new THREE.Group();
  g.name = '鎶ゅ＋';
  const matWhite=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.78});
  const matPink =new THREE.MeshStandardMaterial({color:0xf4a8c0,roughness:.72});

 * 婊炲洖 (hysteresis) 闃叉杈圭晫鍙嶅瑙﹀彂锛岀‘淇?鏃犺瑙﹀彂"
 */

// 瀹炴椂缁樺埗 ECG 蹇冪數娉㈠舰鍒?CanvasTexture
function updateECG(ecg, dt){
  if(!ecg) return;
  const { ctx, tex } = ecg;
  ecg.t += dt;
  const W = ctx.canvas.width, H = ctx.canvas.height;
  // 鑳屾櫙
  ctx.fillStyle = '#0a1828';
  ctx.fillRect(0, 0, W, H);
  // 缃戞牸
  ctx.strokeStyle = 'rgba(40,90,130,.4)';
  ctx.lineWidth = 1;
  for(let x=0; x<W; x+=32){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(let y=0; y<H; y+=32){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  // ECG 娉㈠舰
  ctx.strokeStyle = '#3dffa0';
  ctx.lineWidth = 2.2;
  ctx.beginPath();
  const mid = H * 0.55;
  const phase = ecg.t * 1.6;
  for(let x=0; x<W; x++){
    const u = (x / W) * 6 + phase;
    const cyc = u % 1;
    let y = 0;
    if(cyc < 0.08) y = Math.sin(cyc/0.08 * Math.PI) * 8;
    else if(cyc < 0.18) y = -Math.sin((cyc-0.08)/0.10 * Math.PI) * 6;
    else if(cyc < 0.24) y = -Math.sin((cyc-0.18)/0.06 * Math.PI) * 70;
    else if(cyc < 0.30) y = Math.sin((cyc-0.24)/0.06 * Math.PI) * 40;
    else if(cyc < 0.45) y = Math.sin((cyc-0.30)/0.15 * Math.PI) * 14;
    if(x===0) ctx.moveTo(x, mid - y);
    else      ctx.lineTo(x, mid - y);
  }
  ctx.stroke();
ctx.fillStyle = '#3dffa0';
  ctx.font = 'bold 28px ui-monospace,Consolas,monospace';
  ctx.fillText('HR 78', 16, 32);
  ctx.fillStyle = '#ffd166';
  ctx.font = 'bold 20px ui-monospace,Consolas,monospace';
  ctx.fillText('SpO2 97%', 16, H-16);
  tex.needsUpdate = true;
}

function registerNPC(group, opts){
  group.userData.npc = true;
  group.userData.dialog = opts.dialog;
  group.userData.name   = opts.name;
  group.userData.role   = opts.role;
  group.userData.avatar = opts.avatar;
  group.userData.color  = opts.color;
  group.userData.triggerR = opts.triggerR ?? 1.8;
  group.userData.exitR    = opts.exitR ?? 2.4;
  group.userData.action   = opts.action || null;
  group.userData.actions  = opts.actions || null;
  npcs.push(group);
}

/* ---------- 閿洏鎺у埗锛堜粎鍓嶅悗宸﹀彸 + 鍔犻€?+ 閲嶇疆锛?--------- */
const keys = Object.create(null);
addEventListener('keydown', e=>{
  keys[e.code] = true;
  if(e.code === 'KeyR') resetPose();
}, { passive:true });
addEventListener('keyup', e=>{ keys[e.code] = false; });

/* ---------- HUD 鎸夐挳 ---------- */
let idleOn = true;
btnIdle.addEventListener('click', ()=>{
  idleOn = !idleOn;
  btnIdle.classList.toggle('is-on', idleOn);
});
btnReset.addEventListener('click', resetPose);

function resetPose(){
  if(!model) return;
  model.position.copy(initialState.pos);
  model.rotation.copy(initialState.rot);
  // 閲嶇疆澶撮儴鏈濆悜鑷抽粯璁ゆ鍓嶆柟
  const hg = model.userData.headGroup;
  if(hg){
    hg.rotation.y = 0;
    hg.userData.targetYaw = 0;
  }
}

/* ============================================================
 * 瀵硅瘽绯荤粺锛氱姸鎬佹満 idle 鈫?active(npc, line) 鈫?ended
 *   - currentNPC锛氳繘鍏ヨЕ鍙戝湀鐨?NPC锛堜竴娆″彧鑳戒竴涓紝鏈€杩戜紭鍏堬級
 *   - 婊炲洖妫€娴嬶細杩涘叆 triggerR 瑙﹀彂锛涚寮€ exitR 鎵嶈В閿? *   - 宸茬粨鏉熺殑 NPC 杩涘叆 cooldown锛岄渶璧板嚭 exitR 鍚庢墠鑳藉啀娆¤Е鍙? * ============================================================ */
const dlgEl     = document.getElementById('dialog');
const dlgName   = document.getElementById('dlgName');
const dlgRole   = document.getElementById('dlgRole');
const dlgBody   = document.getElementById('dlgBody');
const dlgAvatar = document.getElementById('dlgAvatar');
const dlgNext   = document.getElementById('dlgNext');
const dlgEnd    = document.getElementById('dlgEnd');
const dlgChoices = document.getElementById('dlgChoices');
const hintEl    = document.getElementById('hint');
const nearEl    = document.getElementById('near');

let currentNPC = null;
let lineIndex  = 0;
const cooldown = new WeakSet();

function openDialog(npc){
  currentNPC = npc;
  lineIndex = 0;
  const u = npc.userData;
  dlgName.textContent = u.name;
  dlgRole.textContent = u.role;
  dlgAvatar.textContent = u.avatar;
  dlgAvatar.style.background = u.color;
  showLine();
  dlgEl.classList.add('is-open');
  hintEl.classList.remove('is-on');
}
function showLine(){
  if(!currentNPC) return;
  const lines = currentNPC.userData.dialog;
  const action = currentNPC.userData.action;
  const actions = currentNPC.userData.actions;
  const isLast = lineIndex >= lines.length - 1;
  dlgBody.textContent = lines[lineIndex];
  dlgChoices.innerHTML = '';
  dlgChoices.style.display = 'none';
  if(isLast && actions && actions.length){
    dlgChoices.style.display = 'grid';
    dlgChoices.innerHTML = actions.map(a => '<button class="dialog__choice" data-url="' + a.url + '"><b>' + a.label + '</b><span>' + (a.desc || '') + '</span></button>').join('');
    dlgChoices.querySelectorAll('.dialog__choice').forEach(btn => {
      btn.addEventListener('click', () => { window.location.href = btn.dataset.url; });
    });
    dlgNext.textContent = '关闭';
    dlgEnd.textContent = '稍后再说';
  }else if(isLast && action){
    dlgNext.textContent = action.label;
    dlgEnd.textContent = action.cancelLabel || '取消';
  }else{
    dlgNext.textContent = isLast ? '完成' : '继续';
    dlgEnd.textContent = '结束对话';
  }
}
function nextLine(){
  if(!currentNPC) return;
  const lines = currentNPC.userData.dialog;
  const action = currentNPC.userData.action;
  const actions = currentNPC.userData.actions;
  const isLast = lineIndex >= lines.length - 1;
  if(isLast){
    if(action && action.url){
      window.location.href = action.url;
      return;
    }
    if(actions && actions.length){
      closeDialog(true);
      return;
    }
    closeDialog(true);
  }else{
    lineIndex++;
    showLine();
  }
}
function closeDialog(markCooldown){
  if(currentNPC && markCooldown) cooldown.add(currentNPC);
  currentNPC = null;
  dlgEl.classList.remove('is-open');
}
dlgNext.addEventListener('click', nextLine);
dlgEnd.addEventListener('click', ()=>closeDialog(true));

/* ---------- 鑷€傚簲 ---------- */
addEventListener('resize', ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio||1, FPS_PIXEL_RATIO_CAP));
});

/* ---------- 涓诲惊鐜?---------- */
const clock = new THREE.Clock();
let fpsFrames = 0, fpsAcc = 0;

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  if(model){
    const speed = (keys.ShiftLeft || keys.ShiftRight) ? 4.0 : 1.8;
    const fwd = new THREE.Vector3(
      controls.target.x - camera.position.x,
      0,
      controls.target.z - camera.position.z
    );
    if(fwd.lengthSq() > 1e-6) fwd.normalize();

    const right = new THREE.Vector3(-fwd.z, 0, fwd.x);
    const inputF = (keys.KeyW ? 1 : 0) - (keys.KeyS ? 1 : 0);
    const inputR = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0);
    const move = new THREE.Vector3()
      .addScaledVector(fwd, inputF)
      .addScaledVector(right, inputR);
    const moving = move.lengthSq() > 0;
    if(moving){
      move.normalize().multiplyScalar(speed * dt);
      model.position.x += move.x;
      model.position.z += move.z;
    }
    model.position.y = 0;

    const headGroup = model.userData.headGroup;
    if(headGroup) headGroup.rotation.y = 0;

    const TURN_SPEED = window.HEAD_TURN_SPEED ?? 6.0;
    if(moving){
      model.userData.targetYaw = Math.atan2(move.x, move.z);
    }
    const target = model.userData.targetYaw;
    if(typeof target === 'number'){
      let delta = target - model.rotation.y;
      while(delta > Math.PI) delta -= Math.PI * 2;
      while(delta < -Math.PI) delta += Math.PI * 2;
      const k = 1 - Math.pow(0.001, dt * (TURN_SPEED / 6));
      model.rotation.y += delta * k;
    }

    if(idleOn){
      const breathe = Math.sin(t * 2.2) * 0.012;
      model.children.forEach(ch=>{
        if(ch.name === 'hoodie_body' || ch.name === 'head' || ch.name === 'hair'){
          ch.position.y += (breathe - (ch.userData._breatheLast || 0));
          ch.userData._breatheLast = breathe;
        }
      });
    }

    // 3. HUD 鏇存柊
    posEl.textContent =
      model.position.x.toFixed(2)+', '+
      model.position.y.toFixed(2)+', '+
      model.position.z.toFixed(2);

    let nearestActive = null;
    let nearestDist = Infinity;
    for(const npc of npcs){
      const dx = model.position.x - npc.position.x;
      const dz = model.position.z - npc.position.z;
      const d  = Math.hypot(dx, dz); // XZ 骞抽潰璺濈
      // 绂诲紑 exitR 鍚庢竻鎺?cooldown锛屽厑璁稿啀娆¤Е鍙?
if(d > npc.userData.exitR && cooldown.has(npc)){
        cooldown.delete(npc);
      }
      if(d < nearestDist){ nearestDist = d; nearestActive = npc; }
    }
    nearEl.textContent = nearestActive
      ? `${nearestActive.userData.name} · ${nearestDist.toFixed(2)}m`
      : '无';

    // 瑙﹀彂閫昏緫
    if(currentNPC){
      const dx = model.position.x - currentNPC.position.x;
      const dz = model.position.z - currentNPC.position.z;
      const d  = Math.hypot(dx, dz);
      if(d > currentNPC.userData.exitR) closeDialog(true);
    }else if(nearestActive
             && nearestDist <= nearestActive.userData.triggerR
             && !cooldown.has(nearestActive)){
      openDialog(nearestActive);
    }
    // 鎻愮ず姘旀场锛氶潬杩戜絾鏈Е鍙戞椂鏄剧ず
    if(!currentNPC && nearestActive
       && nearestDist <= nearestActive.userData.exitR + 0.6
       && nearestDist >  nearestActive.userData.triggerR){
      hintEl.classList.add('is-on');
    }else if(!currentNPC){
      hintEl.classList.remove('is-on');
    }
  }

  // FPS
  fpsFrames++;
  fpsAcc += dt;
  if(fpsAcc >= 0.5){
    fpsEl.textContent = Math.round(fpsFrames/fpsAcc);
    fpsFrames = 0; fpsAcc = 0;
  }

  controls.update();
  // 鍦烘櫙鍔ㄧ敾 ticker锛堝績鐢电洃鎶や华灞忓箷绛夛級
  for(const fn of sceneTickers) fn(dt);
  renderer.render(scene, camera);
}

animate();
</script>
