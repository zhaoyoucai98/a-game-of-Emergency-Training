<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>急救小先锋</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: "Microsoft YaHei", Arial, sans-serif; background: #edf3f7; color: #172033; }
    .shell { height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar { display: flex; align-items: center; gap: 14px; padding: 10px 14px; background: rgba(255,255,255,.94); border-bottom: 1px solid rgba(23,32,51,.1); box-shadow: 0 6px 18px rgba(23,32,51,.06); z-index: 2; }
    .brand { min-width: 118px; font-size: 16px; font-weight: 800; white-space: nowrap; }
    .tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { border: 1px solid rgba(23,32,51,.14); border-radius: 8px; background: #fff; color: #172033; padding: 9px 12px; font: inherit; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .tab.is-active { background: #172033; color: #fff; border-color: #172033; }
    .frame-wrap { position: relative; min-height: 0; }
    iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #fff; }
    @media (max-width: 720px) {
      .topbar { gap: 10px; padding: 8px; }
      .brand { min-width: auto; font-size: 14px; }
      .tab { padding: 8px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">急救小先锋</div>
      <nav class="tabs" aria-label="训练模块">
        <button class="tab is-active" data-src="world.html">3D大厅</button>
        <button class="tab" data-src="firstaid.html">小游戏</button>
        <button class="tab" data-src="firstaid-rescue.html">CPR训练</button>
        <button class="tab" data-src="book.html">知识书</button>
        <button class="tab" data-src="aed.html">AED教学</button>
      </nav>
    </header>
    <section class="frame-wrap">
      <iframe id="appFrame" src="world.html" title="急救小先锋训练模块"></iframe>
    </section>
  </main>
  <script>
    const frame = document.getElementById('appFrame');
    const tabs = Array.from(document.querySelectorAll('.tab'));
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(item => item.classList.remove('is-active'));
        tab.classList.add('is-active');
        frame.src = tab.dataset.src;
      });
    });
  </script>
</body>
</html>
